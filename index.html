<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Launch Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0c0c0c, #1a1a2e);
            color: #ffffff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        #dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #00d4ff;
        }
        #next-launch {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 40px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        #next-launch h2 {
            margin-top: 0;
            color: #00d4ff;
        }
        #countdown {
            font-size: 2em;
            font-weight: bold;
            color: #ff6b6b;
            text-align: center;
        }
        #other-launches {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .launch-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }
        .launch-item h3 {
            margin-top: 0;
            color: #00d4ff;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            #next-launch {
                padding: 15px;
            }
            #countdown {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <h1>Rocket Launch Dashboard</h1>
        <div id="next-launch">
            <h2>Next Launch</h2>
            <p id="mission">Loading...</p>
            <p id="rocket">Loading...</p>
            <p id="site">Loading...</p>
            <p id="datetime">Loading...</p>
            <p id="countdown">Loading...</p>
        </div>
        <div id="other-launches">
            <!-- Other launches will be populated here -->
        </div>
    </div>

    <script>
        const apiUrl = 'https://ll.thespacedevs.com/2.2.0/launch/upcoming/?limit=10';

        async function fetchLaunches() {
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                displayLaunches(data.results);
            } catch (error) {
                console.error('Error fetching launch data:', error);
                document.getElementById('mission').textContent = 'Error loading data';
            }
        }

        function displayLaunches(launches) {
            if (launches.length === 0) return;

            const next = launches[0];
            document.getElementById('mission').textContent = `Mission: ${next.mission?.name || 'Unknown'}`;
            document.getElementById('rocket').textContent = `Rocket: ${next.rocket?.configuration?.name || 'Unknown'}`;
            document.getElementById('site').textContent = `Site: ${next.pad?.location?.name || 'Unknown'}, ${next.pad?.name || ''}`;
            const launchTime = new Date(next.net);
            document.getElementById('datetime').textContent = `Date/Time: ${launchTime.toLocaleString()}`;

            updateCountdown(launchTime);

            const otherContainer = document.getElementById('other-launches');
            otherContainer.innerHTML = '';
            launches.slice(1).forEach(launch => {
                const item = document.createElement('div');
                item.className = 'launch-item';
                item.innerHTML = `
                    <h3>${launch.mission?.name || 'Unknown'}</h3>
                    <p>Rocket: ${launch.rocket?.configuration?.name || 'Unknown'}</p>
                    <p>Site: ${launch.pad?.location?.name || 'Unknown'}, ${launch.pad?.name || ''}</p>
                    <p>Date/Time: ${new Date(launch.net).toLocaleString()}</p>
                `;
                otherContainer.appendChild(item);
            });
        }

        function updateCountdown(launchTime) {
            const countdownEl = document.getElementById('countdown');
            const interval = setInterval(() => {
                const now = new Date();
                const diff = launchTime - now;
                if (diff <= 0) {
                    countdownEl.textContent = 'Launched!';
                    clearInterval(interval);
                    return;
                }
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((diff % (1000 * 60)) / 1000);
                countdownEl.textContent = `${days}d ${hours}h ${mins}m ${secs}s`;
            }, 1000);
        }

        fetchLaunches();
    </script>
</body>
</html>
